apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-pod-labels
  annotations:
    policies.kyverno.io/title: Require Pod Labels
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      All Pods must have the labels 'app' and 'env' defined.
      This helps with resource tracking, monitoring, and governance.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-required-labels
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Pod must have required labels: 'app' and 'env'."
        pattern:
          metadata:
            labels:
              app: "?*"
              env: "?*"
