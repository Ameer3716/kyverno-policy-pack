apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-networkpolicy
  annotations:
    policies.kyverno.io/title: Generate Default NetworkPolicy
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Automatically generates a default deny-all NetworkPolicy
      whenever a new namespace is created with label 'env: production'.
      This ensures namespaces start with a zero-trust network posture.
spec:
  rules:
    - name: generate-default-deny-networkpolicy
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchLabels:
                  env: production
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-deny-all
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        data:
          metadata:
            labels:
              managed-by: kyverno
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
