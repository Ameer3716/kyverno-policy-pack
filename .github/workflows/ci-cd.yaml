name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI (kind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Verify tools
        run: |
          kubectl version --client
          helm version

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kyverno-ci

      - name: Install Kyverno
        run: |
          helm repo add kyverno https://kyverno.github.io/kyverno/
          helm repo update
          helm upgrade --install kyverno kyverno/kyverno \
            --namespace kyverno \
            --create-namespace \
            --set replicaCount=1 \
            --wait \
            --timeout 3m
          kubectl wait --for=condition=Ready pods --all -n kyverno --timeout=120s

      - name: Prepare namespaces
        run: |
          kubectl create namespace devops-demo --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace devops-demo environment=demo --overwrite
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace production env=production --overwrite

      - name: Apply policies
        run: |
          kubectl apply -f policies/validation/
          kubectl apply -f policies/mutation/
          kubectl apply -f policies/generation/

      - name: Run policy tests
        run: |
          chmod +x scripts/test-policies.sh
          bash scripts/test-policies.sh

  cd_minikube:
    name: CD (minikube)
    runs-on: [self-hosted, minikube]
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tools
        shell: powershell
        run: |
          if (-not (Get-Command kubectl -ErrorAction SilentlyContinue)) {
            Write-Error "kubectl not found on runner PATH"
            exit 1
          }
          if (-not (Get-Command minikube -ErrorAction SilentlyContinue)) {
            Write-Error "minikube not found on runner PATH"
            exit 1
          }
          if (-not (Get-Command helm -ErrorAction SilentlyContinue)) {
            $version = "v3.14.4"
            $zip = Join-Path $env:RUNNER_TEMP "helm-$version-windows-amd64.zip"
            $url = "https://get.helm.sh/helm-$version-windows-amd64.zip"
            $dest = Join-Path $env:RUNNER_TEMP "helm-$version"
            Invoke-WebRequest -Uri $url -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath $dest -Force
            $helmDir = Join-Path $dest "windows-amd64"
            Add-Content -Path $env:GITHUB_PATH -Value $helmDir
            $env:PATH = "$helmDir;$env:PATH"
          }
          kubectl version --client
          helm version
          minikube version

      - name: Start minikube
        shell: powershell
        run: |
          $hostStatus = & minikube status --format "{{.Host}}" 2>$null
          if ($LASTEXITCODE -ne 0 -or $hostStatus -ne "Running") {
            Write-Host "Starting minikube with docker driver..."
            # NOTE: If Docker Desktop is not running/accessible, switch --driver=docker
            # to --driver=hyperv (requires Hyper-V enabled on Windows as Administrator)
            minikube start --driver=docker --cpus=2 --memory=4096
            Write-Host "Waiting for minikube to be ready..."
            Start-Sleep -Seconds 15
          } else {
            Write-Host "Minikube is already running."
          }
          minikube update-context

      - name: Verify cluster access
        shell: powershell
        run: |
          $contexts = kubectl config get-contexts -o name
          if ($contexts -notcontains "minikube") {
            Write-Error "minikube context not found after start. Check minikube logs."
            exit 1
          }
          kubectl config use-context minikube
          kubectl cluster-info --request-timeout=30s
          kubectl get nodes

      - name: Install or upgrade Kyverno
        shell: powershell
        run: |
          helm repo add kyverno https://kyverno.github.io/kyverno/ | Out-Null
          helm repo update
          helm upgrade --install kyverno kyverno/kyverno `
            --namespace kyverno `
            --create-namespace `
            --set replicaCount=1 `
            --wait `
            --timeout 3m
          kubectl wait --for=condition=Ready pods --all -n kyverno --timeout=120s

      - name: Prepare namespaces
        shell: powershell
        run: |
          kubectl create namespace devops-demo --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace devops-demo environment=demo --overwrite
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace production env=production --overwrite

      - name: Apply policies
        shell: powershell
        run: |
          kubectl apply -f policies/validation/
          kubectl apply -f policies/mutation/
          kubectl apply -f policies/generation/

      - name: Run policy tests (post-deploy)
        shell: powershell
        run: |
          bash scripts/test-policies.sh